<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join CS2 Server</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(560px, 92vw);
      padding: 24px;
      border-radius: 14px;
      background: #111827;
      border: 1px solid #334155;
    }
    h1 { margin-top: 0; font-size: 24px; }
    p { line-height: 1.5; }
    .addr {
      font-family: monospace;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
      margin: 12px 0;
      word-break: break-all;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      background: #22c55e;
      color: #04130a;
      text-decoration: none;
      font-weight: 700;
      border-radius: 8px;
      padding: 10px 14px;
    }
    .muted { color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Join CS2 Server</h1>
    <p>Launching Counter-Strike 2 and connecting to:</p>
    <div class="addr" id="addr">unknown</div>
    <a class="btn" id="joinBtn" href="#">Open in Steam</a>
    <p class="muted">If nothing happens, click the button above and allow your browser to open Steam.</p>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var addr = (params.get('addr') || '').trim();
      var valid = /^[a-zA-Z0-9.\-]+:\d{1,5}$/.test(addr);
      var target = valid ? ('steam://connect/' + addr) : 'steam://open/main';

      document.getElementById('addr').textContent = valid ? addr : 'invalid address';
      document.getElementById('joinBtn').setAttribute('href', target);

      // Auto-open on load for one-click flow.
      window.location.href = target;
    })();
  </script>
</body>
</html>
